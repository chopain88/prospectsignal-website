  const all=document.createElement('a'); all.textContent='Select all';
  const clr=document.createElement('a'); clr.textContent='Clear';
  acts.appendChild(all); acts.appendChild(clr); panel.appendChild(acts);
  const list=document.createElement('div'); panel.appendChild(list);
  function refreshBadge(){ const b=btn.querySelector('.badge'); if(sel[key].size){b.style.display='';b.textContent=sel[key].size;}else{b.style.display='none';} }
  function rowFor(o){
    const row=document.createElement('label'); row.className='opt';
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=sel[key].has(o.v);
    cb.onchange=()=>{ if(cb.checked)sel[key].add(o.v); else sel[key].delete(o.v); refreshBadge(); redraw(); };
    row.appendChild(cb);
    if(o.col){const sw=document.createElement('span');sw.className='sw';sw.style.background=o.col;row.appendChild(sw);}
    const lb=document.createElement('span'); lb.className='lb'; lb.textContent=o.v; lb.title=o.v; row.appendChild(lb);
    const ct=document.createElement('span'); ct.className='ct'; ct.textContent=o.n; row.appendChild(ct);
    return row;
  }
  function render(f){ list.innerHTML=''; options.filter(o=>!f||o.v.toLowerCase().includes(f)).forEach(o=>list.appendChild(rowFor(o))); }
  render('');
  if(search) search.oninput=()=>render(search.value.toLowerCase());
  all.onclick=()=>{options.forEach(o=>sel[key].add(o.v));refreshBadge();render(search?search.value.toLowerCase():'');redraw();};
  clr.onclick=()=>{sel[key].clear();refreshBadge();render(search?search.value.toLowerCase():'');redraw();};
  btn.onclick=(e)=>{e.stopPropagation();document.querySelectorAll('.panel.open').forEach(p=>{if(p!==panel)p.classList.remove('open')});panel.classList.toggle('open');};
  wrap.appendChild(btn); wrap.appendChild(panel); return wrap;
}
document.addEventListener('click',()=>document.querySelectorAll('.panel.open').forEach(p=>p.classList.remove('open')));
const tb=document.getElementById('toolbar');
const spacer=tb.querySelector('.spacer');
const reset=document.createElement('button'); reset.className='reset'; reset.textContent='Reset filters';
reset.onclick=()=>{sel.c.clear();sel.p.clear();sel.st.clear();document.querySelectorAll('.slicer .badge').forEach(b=>b.style.display='none');document.querySelectorAll('.opt input').forEach(c=>c.checked=false);redraw();};
tb.insertBefore(makeSlicer('Commodity','c',COMMODITIES,{}), spacer);
if(MODE==="product") tb.insertBefore(makeSlicer('Parent company','p',PARENTS,{search:true}), spacer);
tb.insertBefore(makeSlicer('State','st',STATES,{}), spacer);
tb.appendChild(reset);
redraw();
</script></body></html>
