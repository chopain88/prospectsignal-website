[build]
  publish = "."

[[redirects]]
  from = "/product/:slug"
  to = "/product/:slug.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/data/products.json"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/samples/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Disposition = "attachment"
